<section class="stack">
	<h1>Admin Users</h1>
	<div class="table-wrap panel">
		<table>
			<thead>
				<tr><th>Name</th><th>Email</th><th>Role</th><th>Rating</th></tr>
			</thead>
			<tbody>
				<tr *ngFor="let user of users">
					<td>{{ user.fullName }}</td>
					<td>{{ user.email }}</td>
					<td>{{ user.role }}</td>
					<td>{{ user.avgRating }}</td>
				</tr>
			</tbody>
		</table>
	</div>
</section>
